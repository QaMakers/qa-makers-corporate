  />

  <!-- Inner m: two rounded arches (the letterform inside the Q) -->
  <path
    d="M 10 23 L 10 20 A 4 4 0 0 0 14.5 20 A 4 4 0 0 0 19 20 L 19 23"
    fill="none"
    stroke="white"
    stroke-width="2"
