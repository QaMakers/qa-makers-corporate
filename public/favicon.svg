<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="5" fill="#071426"/>

  <!-- Outer Q: rounded square with concave bottom-right corner (the speech-bubble / Q shape) -->
  <path
    d="M 12 5 Q 7 5 7 10 L 7 22 Q 7 27 11 27 L 19 27 Q 18 22 25 17 L 25 10 Q 25 5 20 5 Z"
    fill="none"
    stroke="white"
